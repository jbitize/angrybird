<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Galaxy Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  overscroll-behavior: none;
  background: #000;
}
canvas { display: block; touch-action: none; }
#ui {
  position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; z-index: 10;
}
#message {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  color: #fff; font: bold 36px monospace;
  text-shadow: 0 0 30px #0ff, 0 0 60px #08f;
  z-index: 20; pointer-events: none; display: none;
  text-align: center; line-height: 1.6;
}
#restartBtn {
  position: absolute; top: 62%; left: 50%; transform: translateX(-50%);
  font: bold 18px monospace; padding: 12px 28px;
  background: rgba(0,255,255,0.15); color: #0ff;
  border: 2px solid #0ff; border-radius: 8px;
  text-shadow: 0 0 8px #0ff;
  box-shadow: 0 0 15px rgba(0,255,255,0.3);
  z-index: 20; display: none; cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>
<div id="ui"></div>
<div id="message"></div>
<button id="restartBtn" onclick="startGame()">RESTART</button>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const msgEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

let W, H;
function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

// ===== AUDIO ENGINE (Web Audio API) =====
let audioCtx;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playShoot() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  osc.start(); osc.stop(audioCtx.currentTime + 0.1);
}

function playExplosion() {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 0.15;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = buffer;
  src.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  src.start();
}

function playBigExplosion() {
  ensureAudio();
  const bufferSize = audioCtx.sampleRate * 0.6;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 0.5);
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass'; filter.frequency.value = 800;
  src.buffer = buffer;
  src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
  src.start();
}

function playPickup() {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, audioCtx.currentTime);
  osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08);
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.16);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  osc.start(); osc.stop(audioCtx.currentTime + 0.25);
}

function playStageClear() {
  ensureAudio();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.value = freq;
    const t = audioCtx.currentTime + i * 0.12;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.1, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  });
}

// Boss BGM
let bgmOscillators = [];
function startBossBGM() {
  ensureAudio();
  stopBossBGM();
  // Bass pulse
  const bass = audioCtx.createOscillator();
  const bassGain = audioCtx.createGain();
  bass.type = 'sawtooth'; bass.frequency.value = 55;
  bassGain.gain.value = 0.06;
  bass.connect(bassGain); bassGain.connect(audioCtx.destination);
  bass.start();
  // Rhythm LFO on bass
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 4; lfoGain.gain.value = 0.06;
  lfo.connect(lfoGain); lfoGain.connect(bassGain.gain);
  lfo.start();
  // High tension
  const hi = audioCtx.createOscillator();
  const hiGain = audioCtx.createGain();
  hi.type = 'square'; hi.frequency.value = 110;
  hiGain.gain.value = 0.02;
  hi.connect(hiGain); hiGain.connect(audioCtx.destination);
  hi.start();
  bgmOscillators = [bass, lfo, hi];
  bgmOscillators.gains = [bassGain, lfoGain, hiGain];
}

function stopBossBGM() {
  bgmOscillators.forEach(o => { try { o.stop(); } catch(e) {} });
  bgmOscillators = [];
}

// ===== GAME STATE =====
let ship, bullets, enemies, explosions, stars, items, enemyBullets, engineParticles;
let homingMissiles, asteroids;
let score, gameOver, shootTimer, stage, killCount, killsForBoss;
let boss, bossPhase; // bossPhase: 'none','active','dying','clear'
let touchX = null;
let activeWeapon = 'normal'; // 'normal','triple','rapid','laser','homing'
let weaponTimer = 0;
let shield = false;
let laserActive = false, laserTimer = 0;
let screenShake = 0;
let clearTimer = 0;
let frame = 0;
let lives = 3;
let invincible = 0; // invincibility frames after respawn
let deathPause = 0; // freeze frames to show death
let combo = 0, comboTimer = 0, maxCombo = 0;
let comboDisplay = 0, comboDisplayTimer = 0; // for showing combo text
let highScore = parseInt(localStorage.getItem('galaxyHighScore') || '0');

const KILLS_PER_BOSS = 20;

function createStars() {
  stars = [];
  for (let i = 0; i < 150; i++) {
    stars.push({
      x: Math.random() * W, y: Math.random() * H,
      size: Math.random() * 2.5 + 0.5,
      speed: Math.random() * 1.5 + 0.3,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}

function startGame() {
  score = 0; gameOver = false; shootTimer = 0;
  stage = 1; killCount = 0; killsForBoss = KILLS_PER_BOSS;
  boss = null; bossPhase = 'none';
  msgEl.style.display = 'none';
  restartBtn.style.display = 'none';
  ship = { x: W / 2, y: H - 80, w: 40, h: 44 };
  bullets = []; enemies = []; explosions = [];
  items = []; enemyBullets = []; engineParticles = [];
  homingMissiles = []; asteroids = [];
  touchX = null;
  activeWeapon = 'normal'; weaponTimer = 0;
  shield = false; laserActive = false; laserTimer = 0;
  screenShake = 0; clearTimer = 0; frame = 0;
  spawnTimer = 0;
  lives = 3; invincible = 0; deathPause = 0;
  combo = 0; comboTimer = 0; maxCombo = 0;
  comboDisplay = 0; comboDisplayTimer = 0;
  stopBossBGM();
  createStars();
}

// ===== DRAWING =====

// Fighter ship
function drawShip() {
  const { x, y, w, h } = ship;
  ctx.save();
  ctx.translate(x, y);

  // Wings
  ctx.fillStyle = '#1565C0';
  ctx.beginPath();
  ctx.moveTo(-w * 0.1, 0);
  ctx.lineTo(-w * 0.7, h * 0.45);
  ctx.lineTo(-w * 0.65, h * 0.5);
  ctx.lineTo(-w * 0.15, h * 0.15);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w * 0.1, 0);
  ctx.lineTo(w * 0.7, h * 0.45);
  ctx.lineTo(w * 0.65, h * 0.5);
  ctx.lineTo(w * 0.15, h * 0.15);
  ctx.closePath();
  ctx.fill();

  // Wing tips
  ctx.fillStyle = '#F44336';
  ctx.beginPath();
  ctx.moveTo(-w * 0.65, h * 0.35);
  ctx.lineTo(-w * 0.72, h * 0.5);
  ctx.lineTo(-w * 0.6, h * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(w * 0.65, h * 0.35);
  ctx.lineTo(w * 0.72, h * 0.5);
  ctx.lineTo(w * 0.6, h * 0.5);
  ctx.closePath();
  ctx.fill();

  // Main body
  ctx.fillStyle = '#42A5F5';
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.55);
  ctx.quadraticCurveTo(-w * 0.2, -h * 0.1, -w * 0.18, h * 0.4);
  ctx.lineTo(w * 0.18, h * 0.4);
  ctx.quadraticCurveTo(w * 0.2, -h * 0.1, 0, -h * 0.55);
  ctx.closePath();
  ctx.fill();

  // Body highlight
  ctx.fillStyle = '#64B5F6';
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.5);
  ctx.quadraticCurveTo(-w * 0.08, -h * 0.1, -w * 0.06, h * 0.3);
  ctx.lineTo(w * 0.06, h * 0.3);
  ctx.quadraticCurveTo(w * 0.08, -h * 0.1, 0, -h * 0.5);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#E0F7FA';
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.15, w * 0.09, h * 0.1, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Engine nozzles
  ctx.fillStyle = '#0D47A1';
  ctx.fillRect(-w * 0.12, h * 0.35, w * 0.08, h * 0.1);
  ctx.fillRect(w * 0.04, h * 0.35, w * 0.08, h * 0.1);

  ctx.restore();
}

// Engine flame particles
function spawnEngineParticles() {
  const isMoving = touchX !== null;
  const count = isMoving ? 3 : 1;
  for (let i = 0; i < count; i++) {
    engineParticles.push({
      x: ship.x + (Math.random() - 0.5) * 8,
      y: ship.y + ship.h * 0.45,
      vx: (Math.random() - 0.5) * (isMoving ? 2 : 0.8),
      vy: Math.random() * 3 + 2,
      life: 1,
      size: Math.random() * 3 + 2,
      color: Math.random() > 0.5 ? '#FF9800' : '#FFEB3B'
    });
  }
}

function updateEngineParticles() {
  for (let i = engineParticles.length - 1; i >= 0; i--) {
    const p = engineParticles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.06;
    p.size *= 0.95;
    if (p.life <= 0) engineParticles.splice(i, 1);
  }
}

function drawEngineParticles() {
  engineParticles.forEach(p => {
    ctx.globalAlpha = p.life * 0.8;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// Alien enemy
function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const r = e.r;
  const time = frame * 0.05;

  // Type indicator glow
  if (e.type === 'rusher') {
    ctx.fillStyle = `rgba(255,100,0,${0.15 + Math.sin(time * 3) * 0.1})`;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2); ctx.fill();
  } else if (e.type === 'shooter') {
    ctx.fillStyle = `rgba(255,0,0,${0.15 + Math.sin(time * 2) * 0.1})`;
    ctx.beginPath(); ctx.arc(0, 0, r * 1.3, 0, Math.PI * 2); ctx.fill();
  }

  // Tentacles
  ctx.strokeStyle = e.color;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  const tentacleCount = e.type === 'rusher' ? 6 : 4;
  for (let i = 0; i < tentacleCount; i++) {
    const angle = (Math.PI * 0.3) + (Math.PI * 0.4 / (tentacleCount - 1)) * i;
    const sx = Math.cos(angle) * r * 0.6;
    const sy = Math.sin(angle) * r * 0.6;
    const wave = Math.sin(time + i * 1.5) * (e.rushing ? 8 : 4);
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.quadraticCurveTo(sx + wave, sy + r * 0.5, sx + wave * 0.5, sy + r * 0.9);
    ctx.stroke();
  }

  // Head (dome shape)
  const grad = ctx.createRadialGradient(0, -r * 0.1, r * 0.1, 0, 0, r);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, e.color);
  grad.addColorStop(1, 'rgba(0,0,0,0.3)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.05, r * 0.85, r * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes - big alien eyes
  const eyeW = r * 0.35, eyeH = r * 0.25;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(-r * 0.28, -r * 0.1, eyeW, eyeH, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(r * 0.28, -r * 0.1, eyeW, eyeH, 0.2, 0, Math.PI * 2);
  ctx.fill();
  // Eye shine - red for shooter, orange for rusher
  const eyeColor = e.type === 'shooter' ? '#F44336' : e.type === 'rusher' ? '#FF9800' : '#4FC3F7';
  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(-r * 0.35, -r * 0.18, r * 0.08, 0, Math.PI * 2);
  ctx.arc(r * 0.2, -r * 0.18, r * 0.08, 0, Math.PI * 2);
  ctx.fill();

  // Shooter: small cannon indicator
  if (e.type === 'shooter') {
    ctx.fillStyle = '#F44336';
    ctx.beginPath();
    ctx.arc(0, r * 0.5, r * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

// Boss
function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);
  const r = boss.r;
  const time = frame * 0.03;

  // Glow aura
  ctx.fillStyle = `rgba(255,0,0,${0.05 + Math.sin(time * 2) * 0.03})`;
  ctx.beginPath();
  ctx.arc(0, 0, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // Side armor panels
  ctx.fillStyle = '#4A148C';
  ctx.beginPath();
  ctx.moveTo(-r * 0.9, -r * 0.3);
  ctx.lineTo(-r * 1.2, r * 0.1);
  ctx.lineTo(-r * 1.1, r * 0.5);
  ctx.lineTo(-r * 0.7, r * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r * 0.9, -r * 0.3);
  ctx.lineTo(r * 1.2, r * 0.1);
  ctx.lineTo(r * 1.1, r * 0.5);
  ctx.lineTo(r * 0.7, r * 0.3);
  ctx.closePath();
  ctx.fill();

  // Main body
  const bodyGrad = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r);
  bodyGrad.addColorStop(0, '#CE93D8');
  bodyGrad.addColorStop(0.5, '#6A1B9A');
  bodyGrad.addColorStop(1, '#1A0033');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 0, r * 0.9, r * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Central eye
  const eyeR = r * 0.3;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.05, eyeR * 1.2, eyeR, 0, 0, Math.PI * 2);
  ctx.fill();
  // Iris
  ctx.fillStyle = '#F44336';
  ctx.beginPath();
  ctx.arc(0, -r * 0.05, eyeR * 0.6, 0, Math.PI * 2);
  ctx.fill();
  // Pupil
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(0, -r * 0.05, eyeR * 0.25, 0, Math.PI * 2);
  ctx.fill();
  // Eye glow
  ctx.fillStyle = `rgba(255,60,60,${0.3 + Math.sin(time * 3) * 0.2})`;
  ctx.beginPath();
  ctx.arc(0, -r * 0.05, eyeR * 0.7, 0, Math.PI * 2);
  ctx.fill();

  // Small side eyes
  [-1, 1].forEach(side => {
    ctx.fillStyle = '#D32F2F';
    ctx.beginPath();
    ctx.arc(side * r * 0.55, -r * 0.25, r * 0.1, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(side * r * 0.55, -r * 0.25, r * 0.04, 0, Math.PI * 2);
    ctx.fill();
  });

  // Teeth/spikes at bottom
  ctx.fillStyle = '#E0E0E0';
  for (let i = -3; i <= 3; i++) {
    const tx = i * r * 0.18;
    ctx.beginPath();
    ctx.moveTo(tx - r * 0.06, r * 0.55);
    ctx.lineTo(tx, r * 0.75);
    ctx.lineTo(tx + r * 0.06, r * 0.55);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();

  // Health bar
  const barW = r * 2.2;
  const barH = 8;
  const barX = boss.x - barW / 2;
  const barY = boss.y - boss.r - 20;
  const hpRatio = boss.hp / boss.maxHp;

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
  ctx.fillStyle = hpRatio > 0.5 ? '#4CAF50' : hpRatio > 0.25 ? '#FF9800' : '#F44336';
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX - 1, barY - 1, barW + 2, barH + 2);

  // Boss name
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  const bossNames = { warship: 'WARSHIP', splitter: 'SPLITTER', tentacle: 'TENTACLE' };
  ctx.fillText(`${bossNames[boss.bossType] || 'BOSS'} LV.${stage}`, boss.x, barY - 6);
}

// Tentacle boss visual
function drawTentacleBoss() {
  if (!boss || boss.bossType !== 'tentacle') return;
  // Draw animated tentacles extending from boss
  ctx.save();
  const time = frame * 0.04;
  ctx.strokeStyle = '#4A148C';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  for (let t = 0; t < 6; t++) {
    const baseAngle = (Math.PI * 0.15) + (Math.PI * 0.7 / 5) * t;
    const len = boss.r * 1.5;
    ctx.beginPath();
    const sx = boss.x + Math.cos(baseAngle - Math.PI / 2) * boss.r * 0.5;
    const sy = boss.y + Math.sin(baseAngle) * boss.r * 0.3;
    ctx.moveTo(sx, sy);
    const wave1 = Math.sin(time + t * 1.2) * 15;
    const wave2 = Math.cos(time * 0.7 + t * 0.8) * 10;
    const ex = sx + Math.cos(baseAngle) * len + wave1;
    const ey = sy + Math.sin(baseAngle) * len + wave2;
    const cx1 = sx + wave1 * 0.5;
    const cy1 = sy + len * 0.3;
    ctx.quadraticCurveTo(cx1, cy1, ex, ey);
    ctx.stroke();
    // Tentacle tip
    ctx.fillStyle = '#E040FB';
    ctx.beginPath();
    ctx.arc(ex, ey, 4, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// Splitter boss visual (glowing core)
function drawSplitterBoss() {
  if (!boss || boss.bossType !== 'splitter') return;
  ctx.save();
  const pulse = Math.sin(frame * 0.06) * 0.3;
  ctx.fillStyle = `rgba(224,64,251,${0.15 + pulse})`;
  ctx.beginPath();
  ctx.arc(boss.x, boss.y, boss.r * 0.4, 0, Math.PI * 2);
  ctx.fill();
  // Split line indicator
  ctx.strokeStyle = `rgba(224,64,251,${0.4 + pulse})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(boss.x, boss.y - boss.r * 0.6);
  ctx.lineTo(boss.x, boss.y + boss.r * 0.6);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// (drawBullet moved below with steal support)

// Enhanced explosion with particles
function createExplosion(x, y, color, count) {
  count = count || 14;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.3;
    const speed = Math.random() * 4 + 1.5;
    explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      size: Math.random() * 4 + 2,
      color: color || '#ff0',
      type: 'particle'
    });
  }
  // Add a flash
  explosions.push({
    x, y, vx: 0, vy: 0,
    life: 0.6, size: 20,
    color: '#fff', type: 'flash'
  });
}

function createBigExplosion(x, y) {
  const colors = ['#F44336', '#FF9800', '#FFEB3B', '#fff', '#E040FB'];
  for (let wave = 0; wave < 4; wave++) {
    for (let i = 0; i < 20; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6 + 2 + wave * 1.5;
      explosions.push({
        x: x + (Math.random() - 0.5) * 30,
        y: y + (Math.random() - 0.5) * 30,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        size: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        type: 'particle',
        delay: wave * 4
      });
    }
  }
  // Big flash
  explosions.push({ x, y, vx: 0, vy: 0, life: 1, size: 80, color: '#fff', type: 'flash' });
}

function drawExplosions() {
  explosions.forEach(p => {
    if (p.delay && p.delay > 0) return;
    ctx.globalAlpha = Math.min(p.life, 1);
    if (p.type === 'flash') {
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * p.life);
      grad.addColorStop(0, `rgba(255,255,255,${p.life})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function updateExplosions() {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const p = explosions[i];
    if (p.delay && p.delay > 0) { p.delay--; continue; }
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.type === 'flash' ? 0.08 : 0.025;
    if (p.life <= 0) explosions.splice(i, 1);
  }
}

// Homing missiles
function drawHomingMissiles() {

    ctx.rotate(angle - Math.PI / 2);

    ctx.beginPath();
    ctx.moveTo(0, -8);
    ctx.lineTo(-3, 4);
    ctx.lineTo(3, 4);
    ctx.closePath();

      explosions.push({

        life: 0.5, size: 2 + Math.random() * 2, color: '#888', type: 'particle'
      });
    }
  });
}

function updateHomingMissiles() {
  for (let i = homingMissiles.length - 1; i >= 0; i--) {
    const m = homingMissiles[i];
    // Find closest target
    let target = null, minDist = Infinity;
    enemies.forEach(e => {
      const d = Math.hypot(e.x - m.x, e.y - m.y);
      if (d < minDist) { minDist = d; target = e; }
    });
    if (!target && boss && bossPhase === 'active') target = boss;
    if (target) {
      const dx = target.x - m.x, dy = target.y - m.y;
      const dist = Math.hypot(dx, dy);
      const turnSpeed = 0.12;
      m.vx += (dx / dist) * turnSpeed;
      m.vy += (dy / dist) * turnSpeed;
      const spd = Math.hypot(m.vx, m.vy);
      const maxSpd = 7;
      if (spd > maxSpd) { m.vx = (m.vx / spd) * maxSpd; m.vy = (m.vy / spd) * maxSpd; }
    }
    m.x += m.vx; m.y += m.vy;
    m.life--;
    if (m.life <= 0 || m.y < -20 || m.y > H + 20 || m.x < -20 || m.x > W + 20) {
      homingMissiles.splice(i, 1); continue;
    }
    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (Math.hypot(m.x - e.x, m.y - e.y) < e.r + 6) {
        createExplosion(e.x, e.y, e.color, 14);
        playExplosion();
        addKill();
        if (Math.random() < 0.18) {
          const types = ['triple','rapid','laser','homing','shield','bomb'];
          items.push({ x: e.x, y: e.y, type: types[Math.floor(Math.random() * types.length)], speed: 2 });
        }
        enemies.splice(j, 1);
        homingMissiles.splice(i, 1);
        if (killCount >= killsForBoss && bossPhase === 'none') spawnBoss();
        break;
      }
    }
    // Hit boss
    if (boss && bossPhase === 'active' && homingMissiles[i]) {
      if (Math.hypot(m.x - boss.x, m.y - boss.y) < boss.r) {
        boss.hp -= 3;
        createExplosion(m.x, m.y, '#4CAF50', 8);
        homingMissiles.splice(i, 1);
        if (boss.hp <= 0) triggerBossDefeat();
      }
    }
  }
}

// Laser beam
function drawLaser() {

  ctx.moveTo(ship.x, ship.y - ship.h / 2);
  ctx.lineTo(ship.x, 0);

}

function updateLaser() {
  if (!laserActive) return;
  laserTimer--;
  if (laserTimer <= 0) { laserActive = false; activeWeapon = 'normal'; return; }
  const lw = 12;
  // Hit enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (Math.abs(e.x - ship.x) < lw + e.r && e.y < ship.y) {
      createExplosion(e.x, e.y, '#FFEB3B', 10);
      playExplosion();
      addKill();
      if (Math.random() < 0.18) {

        items.push({ x: e.x, y: e.y, type: types[Math.floor(Math.random() * types.length)], speed: 2 });
      }
      enemies.splice(i, 1);
      if (killCount >= killsForBoss && bossPhase === 'none') spawnBoss();
    }
  }
  // Hit boss
  if (boss && bossPhase === 'active') {
    if (Math.abs(boss.x - ship.x) < lw + boss.r && boss.y > 0) {
      if (frame % 3 === 0) {
        boss.hp--;
        createExplosion(ship.x + (Math.random()-0.5)*10, boss.y + boss.r * 0.5, '#FFEB3B', 4);
        if (boss.hp <= 0) triggerBossDefeat();
      }
    }
  }
}

// Boss defeat helper
function triggerBossDefeat() {
  const bx = boss.x, by = boss.y;
  const bt = boss.bossType;
  createBigExplosion(bx, by);
  playBigExplosion();
  screenShake = 25;
  score += 50;

  // Splitter: spawn 2 mini enemies on first death
  if (bt === 'splitter' && boss.splitCount === 0) {
    spawnMiniBoss(bx - 40, by, 8 + stage * 2);
    spawnMiniBoss(bx + 40, by, 8 + stage * 2);
  }

  stopBossBGM();
  playStageClear();
  bossPhase = 'clear';
  clearTimer = 180;
  boss = null;
  msgEl.innerHTML = `STAGE ${stage} CLEAR!`;
  msgEl.style.textShadow = '0 0 30px #0f0, 0 0 60px #0f0';
  msgEl.style.color = '#0f0';
  msgEl.style.display = 'block';
}

// Bomb effect
function triggerBomb() {
  playBigExplosion();
  screenShake = 20;
  // Kill all enemies on screen
  for (let i = enemies.length - 1; i >= 0; i--) {
    createExplosion(enemies[i].x, enemies[i].y, enemies[i].color, 10);
    addKill();
  }
  enemies = [];
  // Clear enemy bullets
  enemyBullets = [];
  // Damage boss
  if (boss && bossPhase === 'active') {
    boss.hp -= 10;
    createBigExplosion(boss.x, boss.y);
    if (boss.hp <= 0) triggerBossDefeat();
  }
  // Screen flash
  explosions.push({ x: W/2, y: H/2, vx: 0, vy: 0, life: 0.8, size: Math.max(W, H), color: '#fff', type: 'flash' });
  if (killCount >= killsForBoss && bossPhase === 'none') spawnBoss();
}

function fireHomingMissiles() {

// Player hit - lives system
function playerHit() {
  if (invincible > 0) return false; // still invincible
  if (shield) {
    shield = false;
    createExplosion(ship.x, ship.y, '#4af', 10);
    return false; // survived via shield
  }
  lives--;
  createExplosion(ship.x, ship.y, '#0ff', 20);
  playExplosion();
  combo = 0; comboTimer = 0; // reset combo on hit
  activeWeapon = 'normal'; weaponTimer = 0; laserActive = false; // lose weapon on death
  if (lives <= 0) {
    gameOver = true;
    stopBossBGM();
    // High score check
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('galaxyHighScore', String(highScore));
      msgEl.innerHTML = `GAME OVER<br><span style="font-size:20px">SCORE: ${score}</span><br><span style="font-size:18px;color:#ff0">★ NEW RECORD! ★</span>`;
    } else {
      msgEl.innerHTML = `GAME OVER<br><span style="font-size:20px">SCORE: ${score}</span><br><span style="font-size:14px;color:#aaa">BEST: ${highScore}</span>`;
    }
    msgEl.style.textShadow = '0 0 30px #0ff, 0 0 60px #08f';
    msgEl.style.color = '#fff';
    msgEl.style.display = 'block';
    restartBtn.style.display = 'block';
    return true; // dead
  }
  // Freeze + respawn with invincibility
  deathPause = 90; // 1.5s freeze to show death
  invincible = 300; // 5 seconds invincible after respawn
  screenShake = 15;
  return false; // still alive
}

// Combo system
function addKill() {
  score++;
  combo++;
  comboTimer = 120; // 2 seconds to maintain combo
  if (combo >= 2) {
    comboDisplay = combo;
    comboDisplayTimer = 60;
    score += combo - 1; // bonus points
  }
  if (combo > maxCombo) maxCombo = combo;
  killCount++;
}

// Asteroid drawing
function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.angle);
  // Cracks based on damage
  const dmgRatio = 1 - a.hp / a.maxHp;
  // Body
  const grad = ctx.createRadialGradient(-a.r * 0.2, -a.r * 0.2, a.r * 0.1, 0, 0, a.r);
  grad.addColorStop(0, '#9E9E9E');
  grad.addColorStop(0.6, '#616161');
  grad.addColorStop(1, '#212121');
  ctx.fillStyle = grad;
  ctx.beginPath();
  for (let i = 0; i < a.vertices; i++) {
    const ang = (Math.PI * 2 / a.vertices) * i;
    const vr = a.r * (0.8 + a.shape[i] * 0.4);
    if (i === 0) ctx.moveTo(Math.cos(ang) * vr, Math.sin(ang) * vr);
    else ctx.lineTo(Math.cos(ang) * vr, Math.sin(ang) * vr);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#424242';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Cracks
  if (dmgRatio > 0) {
    ctx.strokeStyle = `rgba(255,140,0,${dmgRatio * 0.8})`;
    ctx.lineWidth = 1;
    for (let c = 0; c < Math.floor(dmgRatio * 4); c++) {
      const ca = Math.random() * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(ca) * a.r * 0.7, Math.sin(ca) * a.r * 0.7);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function spawnAsteroid() {
  const r = Math.random() * 15 + 20;
  const vertices = Math.floor(Math.random() * 4) + 6;
  const shape = [];
  for (let i = 0; i < vertices; i++) shape.push(Math.random());
  const maxHp = Math.floor(r / 8) + 2;
  asteroids.push({
    x: Math.random() * (W - r * 2) + r,
    y: -r,
    r, speed: Math.random() * 1 + 0.5,
    angle: 0, rotSpeed: (Math.random() - 0.5) * 0.03,
    vertices, shape, hp: maxHp, maxHp
  });
}

function updateAsteroids() {
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.y += a.speed;
    a.angle += a.rotSpeed;
    if (a.y > H + a.r + 20) { asteroids.splice(i, 1); continue; }
    // Collision with ship
    if (Math.hypot(a.x - ship.x, a.y - ship.y) < a.r + 16) {
      if (playerHit()) return true;
      asteroids.splice(i, 1);
      continue;
    }
  }
  // Bullet vs asteroid
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (Math.hypot(b.x - a.x, b.y - a.y) < a.r) {
        a.hp--;
        createExplosion(b.x, b.y, '#9E9E9E', 4);
        bullets.splice(i, 1);
        if (a.hp <= 0) {
          createExplosion(a.x, a.y, '#FF9800', 16);
          playExplosion();
          // High item drop chance (50%)
          if (Math.random() < 0.5) {
            const types = ['triple','rapid','laser','homing','shield','bomb'];
            items.push({ x: a.x, y: a.y, type: types[Math.floor(Math.random() * types.length)], speed: 2 });
          }
          score += 3;
          asteroids.splice(j, 1);
        }
        break;
      }
    }
  }
  // Laser vs asteroid
  if (laserActive) {
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const a = asteroids[j];
      if (Math.abs(a.x - ship.x) < 12 + a.r && a.y < ship.y) {
        if (frame % 4 === 0) {
          a.hp--;
          createExplosion(a.x, a.y, '#FFEB3B', 3);
          if (a.hp <= 0) {
            createExplosion(a.x, a.y, '#FF9800', 16);
            playExplosion();
            if (Math.random() < 0.5) {
              const types = ['triple','rapid','laser','homing','shield','bomb'];
              items.push({ x: a.x, y: a.y, type: types[Math.floor(Math.random() * types.length)], speed: 2 });
            }
            score += 3;
            asteroids.splice(j, 1);
          }
        }
      }
    }
  }
  return false;
}

// Collision
function circleRect(cx, cy, cr, rx, ry, rw, rh) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - closestX, dy = cy - closestY;
  return (dx * dx + dy * dy) < (cr * cr);
}
function circleDist(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return (dx * dx + dy * dy) < ((r1 + r2) * (r1 + r2));
}

// ===== SPAWN =====
let spawnTimer = 0;
function spawnEnemy() {
  const r = Math.random() * 10 + 14;
  const colors = ['#66BB6A', '#26A69A', '#AB47BC', '#EC407A', '#7E57C2'];
  const speedMult = 1.5 + (stage - 1) * 0.4;
  const color = colors[Math.floor(Math.random() * colors.length)];
  const x = Math.random() * (W - r * 2) + r;

  // Pick enemy type based on stage
  let type = 'normal';
  const roll = Math.random();
  if (stage >= 4 && roll < 0.15) type = 'shooter';
  else if (stage >= 3 && roll < 0.30) type = 'rusher';
  else if (stage >= 2 && roll < 0.45) type = 'zigzag';

  const base = { x, y: -r, r, color, type, shootTimer: 0, rushing: false };

  if (type === 'zigzag') {
    base.speed = (Math.random() * 1.2 + 0.8) * speedMult;
    base.amplitude = Math.random() * 40 + 30;
    base.freq = Math.random() * 0.04 + 0.03;
    base.startX = x;
    base.phase = Math.random() * Math.PI * 2;
  } else if (type === 'rusher') {
    base.speed = (Math.random() * 0.5 + 0.5) * speedMult;
    base.rushSpeed = (Math.random() * 4 + 6) * speedMult;
    base.rushing = false;
  } else if (type === 'shooter') {
    base.speed = (Math.random() * 0.6 + 0.4) * speedMult;
    base.shootTimer = 0;
    base.shootRate = Math.max(40, 80 - stage * 5);
  } else {
    base.speed = (Math.random() * 1.5 + 1) * speedMult;
  }

  enemies.push(base);
}

function spawnBoss() {
  bossPhase = 'active';
  const hpBase = 30 + stage * 20;
  const bossType = stage % 3 === 1 ? 'warship' : stage % 3 === 2 ? 'splitter' : 'tentacle';
  boss = {
    x: W / 2, y: -80,
    r: 55 + stage * 5,
    hp: hpBase, maxHp: hpBase,
    speed: 0.8,
    dir: 1,
    shootTimer: 0,
    targetY: 100,
    bossType,
    splitCount: 0 // for splitter boss
  };
  startBossBGM();
}

// Mini-boss from splitter
function spawnMiniBoss(x, y, hp) {
  enemies.push({
    x, y, r: 25, color: '#E040FB', type: 'normal',
    speed: 1.5 + stage * 0.2, shootTimer: 0, rushing: false, isMini: true, miniHp: hp
  });
}

// ===== INPUT =====
function onTouchStart(e) { if (e.target === restartBtn) return; e.preventDefault(); if (e.touches.length > 0) touchX = e.touches[0].clientX; ensureAudio(); }
function onTouchMove(e) { if (e.target === restartBtn) return; e.preventDefault(); if (e.touches.length > 0) touchX = e.touches[0].clientX; }
function onTouchEnd(e) { if (e.target === restartBtn) return; e.preventDefault(); touchX = null; }

let mouseDown = false;
canvas.addEventListener('mousedown', e => { mouseDown = true; touchX = e.clientX; ensureAudio(); });
canvas.addEventListener('mousemove', e => { if (mouseDown) touchX = e.clientX; });
canvas.addEventListener('mouseup', () => { mouseDown = false; touchX = null; });

document.addEventListener('touchstart', onTouchStart, { passive: false });
document.addEventListener('touchmove', onTouchMove, { passive: false });
document.addEventListener('touchend', onTouchEnd, { passive: false });
document.addEventListener('touchcancel', onTouchEnd, { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('gesturechange', e => e.preventDefault());

// ===== UPDATE =====
function update() {
  if (gameOver) return;
  frame++;

  // Death pause - freeze gameplay, show message
  if (deathPause > 0) {
    deathPause--;
    updateExplosions(); // still show explosions during pause
    if (deathPause <= 0) {
      ship.x = W / 2; // respawn center after pause
    }
    return;
  }

  // Stage clear transition
  if (bossPhase === 'clear') {
    clearTimer--;
    if (clearTimer <= 0) {
      stage++;
      killCount = 0;
      bossPhase = 'none';
      boss = null;
      enemies = [];
      enemyBullets = [];
      msgEl.style.display = 'none';
    }
    updateExplosions();
    updateStars();
    updateEngineParticles();
    spawnEngineParticles();
    return;
  }

  // Move ship (instant follow)
  if (touchX !== null) {
    ship.x = touchX;
  }
  ship.x = Math.max(ship.w / 2, Math.min(W - ship.w / 2, ship.x));

  // Engine particles
  spawnEngineParticles();
  updateEngineParticles();

  // Weapon timer
  if (activeWeapon !== 'normal' && activeWeapon !== 'laser') {
    weaponTimer--;
    if (weaponTimer <= 0) activeWeapon = 'normal';
  }

  // Laser update
  updateLaser();

  // Homing missiles update
  updateHomingMissiles();

  // Auto shoot
  const shootRate = activeWeapon === 'rapid' ? 4 : 12;
  shootTimer++;
  if (shootTimer >= shootRate && !laserActive) {
    shootTimer = 0;
    playShoot();
    const bx = ship.x, by = ship.y - ship.h / 2;
    if (activeWeapon === 'triple') {
      bullets.push({ x: bx, y: by, vx: 0, vy: -9 });
      bullets.push({ x: bx, y: by, vx: -2.8, vy: -8.5 });
      bullets.push({ x: bx, y: by, vx: 2.8, vy: -8.5 });
    } else if (activeWeapon === 'rapid') {
      bullets.push({ x: bx + (Math.random()-0.5)*6, y: by, vx: (Math.random()-0.5)*0.8, vy: -12 });
    } else {
      bullets.push({ x: bx, y: by, vx: 0, vy: -9 });
    }
  }

  // Update player bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    bullets[i].x += bullets[i].vx;
    bullets[i].y += bullets[i].vy;
    if (bullets[i].y < -10 || bullets[i].x < -10 || bullets[i].x > W + 10) bullets.splice(i, 1);
  }

  // Invincibility timer
  if (invincible > 0) invincible--;

  // Combo timer
  if (comboTimer > 0) { comboTimer--; if (comboTimer <= 0) combo = 0; }
  if (comboDisplayTimer > 0) comboDisplayTimer--;

  // Update enemy bullets
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    if (b.steal) {
      const wave = Math.sin(frame * 0.2 + b.y * 0.1) * 3;
      b.x += b.vx + wave * 0.05; b.y += b.vy;
    } else {
      b.x += b.vx; b.y += b.vy;
    }
    if (b.y > H + 10 || b.x < -10 || b.x > W + 10) { enemyBullets.splice(i, 1); continue; }
    // Hit player
    const dx = b.x - ship.x, dy = b.y - ship.y;
    if (dx * dx + dy * dy < 20 * 20 && invincible <= 0) {
      if (b.steal) {
        // Steal weapon
        activeWeapon = 'normal'; weaponTimer = 0; laserActive = false;
        createExplosion(ship.x, ship.y, '#9C27B0', 8);
        enemyBullets.splice(i, 1);
        continue;
      }
      enemyBullets.splice(i, 1);
      if (playerHit()) return;
    }
  }

  // Spawn enemies (not during boss)
  if (bossPhase === 'none') {
    spawnTimer++;
    const baseRate = Math.max(8, 25 - stage * 3);
    if (spawnTimer >= baseRate) {
      spawnTimer = 0;
      spawnEnemy();
      // Wave spawn: extra enemies at higher stages
      if (Math.random() < 0.3 + stage * 0.1) spawnEnemy();
      if (stage >= 3 && Math.random() < 0.2) spawnEnemy();
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.type === 'zigzag') {
      e.y += e.speed;
      e.x = e.startX + Math.sin(e.phase + frame * e.freq) * e.amplitude;
    } else if (e.type === 'rusher') {
      if (!e.rushing && e.y > H * 0.3) {
        e.rushing = true;
        const dx = ship.x - e.x, dy = ship.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        e.vx = (dx / dist) * e.rushSpeed;
        e.vy = (dy / dist) * e.rushSpeed;
      }
      if (e.rushing) { e.x += e.vx; e.y += e.vy; }
      else { e.y += e.speed; }
    } else if (e.type === 'shooter') {
      e.y += e.speed;
      e.shootTimer++;
      if (e.shootTimer >= e.shootRate && e.y > 0 && e.y < H * 0.5) {
        e.shootTimer = 0;
        const dx = ship.x - e.x, dy = ship.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const spd = 3 + stage * 0.2;
        const isSteal = activeWeapon !== 'normal' && Math.random() < 0.25;
        enemyBullets.push({ x: e.x, y: e.y + e.r, vx: (dx / dist) * spd, vy: (dy / dist) * spd, isEnemy: true, steal: isSteal });
      }
    } else {
      e.y += e.speed;
    }
    if (enemies[i].y > H + 30 || enemies[i].x < -50 || enemies[i].x > W + 50) { enemies.splice(i, 1); continue; }
    if (e && invincible <= 0 && circleRect(e.x, e.y, e.r, ship.x - ship.w / 2, ship.y - ship.h / 2, ship.w, ship.h)) {
      createExplosion(e.x, e.y, e.color, 12);
      enemies.splice(i, 1);
      if (playerHit()) return;
    }
  }

  // Bullet vs enemy
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = b.x - e.x, dy = b.y - e.y;
      if (dx * dx + dy * dy < e.r * e.r) {
        createExplosion(e.x, e.y, e.color, 14);
        playExplosion();
        if (Math.random() < 0.18) {
          const types = ['triple','rapid','laser','homing','shield','bomb'];
          items.push({ x: e.x, y: e.y, type: types[Math.floor(Math.random() * types.length)], speed: 2 });
        }
        bullets.splice(i, 1);
        enemies.splice(j, 1);
        addKill();
        hit = true;
        if (killCount >= killsForBoss && bossPhase === 'none') {
          spawnBoss();
        }
        break;
      }
    }
    if (hit) continue;

    // Bullet vs boss
    if (boss && bossPhase === 'active' && !hit) {
      const dx = b.x - boss.x, dy = b.y - boss.y;
      if (dx * dx + dy * dy < boss.r * boss.r) {
        boss.hp--;
        createExplosion(b.x, b.y, '#E040FB', 6);
        bullets.splice(i, 1);
        if (boss.hp <= 0) triggerBossDefeat();
      }
    }
  }

  // Boss AI (3-phase system)
  if (boss && bossPhase === 'active') {
    const hpRatio = boss.hp / boss.maxHp;
    const bossStage = hpRatio > 0.5 ? 1 : hpRatio > 0.25 ? 2 : 3;

    // Move to target Y
    if (boss.y < boss.targetY) boss.y += 1.5;

    // Phase 3: occasional charge toward player
    if (bossStage === 3 && !boss.charging) {
      boss.chargeTimer = (boss.chargeTimer || 0) + 1;
      if (boss.chargeTimer > 120) {
        boss.charging = true;
        boss.chargeTimer = 0;
        boss.chargeTargetX = ship.x;
        boss.chargeTargetY = Math.min(ship.y - 80, H * 0.6);
        boss.origY = boss.y;
      }
    }
    if (boss.charging) {
      const cdx = boss.chargeTargetX - boss.x;
      const cdy = boss.chargeTargetY - boss.y;
      boss.x += cdx * 0.08;
      boss.y += cdy * 0.08;
      if (Math.abs(cdx) < 5 && Math.abs(cdy) < 5) {
        boss.charging = false;
        boss.targetY = 100;
        // Return to top
        boss.y += (boss.origY - boss.y) * 0.05;
      }
    } else {
      // Horizontal movement - faster in later phases
      const moveSpeed = boss.speed * (bossStage === 1 ? 1 : bossStage === 2 ? 1.6 : 2.2);
      boss.x += moveSpeed * boss.dir;
      if (boss.x > W - boss.r) boss.dir = -1;
      if (boss.x < boss.r) boss.dir = 1;
      // Return to target Y after charge
      if (boss.y > boss.targetY + 10) boss.y -= 1;
    }

    // Shoot based on phase
    boss.shootTimer++;
    const baseShootRate = Math.max(15, 45 - stage * 4);
    const shootRate = bossStage === 1 ? baseShootRate : bossStage === 2 ? Math.floor(baseShootRate * 0.7) : Math.floor(baseShootRate * 0.5);

    if (boss.shootTimer >= shootRate) {
      boss.shootTimer = 0;
      const dx = ship.x - boss.x, dy = ship.y - boss.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const speed = 3.5 + stage * 0.3;

      if (boss.bossType === 'tentacle') {
        // Tentacle boss: wide sweep attacks
        if (bossStage <= 2) {
          // Sweep of bullets from side to side
          const sweepCount = 5 + stage;
          for (let s = 0; s < sweepCount; s++) {
            const angle = Math.PI * 0.3 + (Math.PI * 0.4 / (sweepCount - 1)) * s;
            enemyBullets.push({
              x: boss.x, y: boss.y + boss.r * 0.5,
              vx: Math.cos(angle) * speed * 0.9, vy: Math.sin(angle) * speed * 0.9, isEnemy: true
            });
          }
        } else {
          // Phase 3: tentacle whip - dense wave + aimed
          for (let s = 0; s < 12; s++) {
            const angle = Math.PI * 0.2 + (Math.PI * 0.6 / 11) * s;
            enemyBullets.push({
              x: boss.x + Math.cos(angle) * boss.r * 0.5,
              y: boss.y + Math.sin(angle) * boss.r * 0.5,
              vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, isEnemy: true
            });
          }
          enemyBullets.push({
            x: boss.x, y: boss.y + boss.r * 0.6,
            vx: (dx / dist) * speed * 1.3, vy: (dy / dist) * speed * 1.3, isEnemy: true
          });
        }
      } else {
        // Warship & Splitter: original phase logic
        if (bossStage === 1) {
          enemyBullets.push({
            x: boss.x, y: boss.y + boss.r * 0.6,
            vx: (dx / dist) * speed, vy: (dy / dist) * speed, isEnemy: true
          });
        } else if (bossStage === 2) {
          const fanCount = 3 + Math.min(2, Math.floor(stage / 2));
          const spread = 0.6;
          const baseAngle = Math.atan2(dy, dx);
          for (let f = 0; f < fanCount; f++) {
            const angle = baseAngle - spread / 2 + (spread / (fanCount - 1)) * f;
            enemyBullets.push({
              x: boss.x, y: boss.y + boss.r * 0.6,
              vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, isEnemy: true
            });
          }
        } else {
          const circleCount = 8 + stage * 2;
          for (let c = 0; c < circleCount; c++) {
            const angle = (Math.PI * 2 / circleCount) * c + frame * 0.05;
            enemyBullets.push({
              x: boss.x, y: boss.y,
              vx: Math.cos(angle) * speed * 0.8, vy: Math.sin(angle) * speed * 0.8, isEnemy: true
            });
          }
          enemyBullets.push({
            x: boss.x, y: boss.y + boss.r * 0.6,
            vx: (dx / dist) * speed * 1.2, vy: (dy / dist) * speed * 1.2, isEnemy: true
          });
        }
      }
    }
    // Boss collision with ship
    if (invincible <= 0 && circleDist(boss.x, boss.y, boss.r, ship.x, ship.y, 18)) {
      if (playerHit()) return;
    }
  }

  // Update items
  for (let i = items.length - 1; i >= 0; i--) {
    items[i].y += items[i].speed;
    if (items[i].y > H + 20) { items.splice(i, 1); continue; }
    const dx = items[i].x - ship.x, dy = items[i].y - ship.y;
    if (dx * dx + dy * dy < 30 * 30) {
      playPickup();
      const t = items[i].type;
      if (t === 'triple') {
        activeWeapon = 'triple'; weaponTimer = 600;
      } else if (t === 'rapid') {
        activeWeapon = 'rapid'; weaponTimer = 600;
      } else if (t === 'laser') {
        activeWeapon = 'laser'; laserActive = true; laserTimer = 300;
      } else if (t === 'homing') {
        fireHomingMissiles();
      } else if (t === 'shield') {
        shield = true;
      } else if (t === 'bomb') {
        triggerBomb();
      }
      items.splice(i, 1);
    }
  }

  // Asteroids
  if (frame % 180 === 0 && bossPhase === 'none' && Math.random() < 0.5) spawnAsteroid();
  if (updateAsteroids()) return; // returns true if game over

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.9;
  if (screenShake < 0.5) screenShake = 0;

  updateStars();
  updateExplosions();
}

// ===== DRAW =====
function draw() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    const sx = (Math.random() - 0.5) * screenShake * 2;
    const sy = (Math.random() - 0.5) * screenShake * 2;
    ctx.translate(sx, sy);
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(-10, -10, W + 20, H + 20);

  drawStars();

  if (!gameOver) {
    drawEngineParticles();
    // Blink when invincible
    if (invincible <= 0 || Math.floor(invincible / 4) % 2 === 0) {
      drawShip();
    }
    drawShield();
    drawLaser();
    drawHomingMissiles();
  }
  asteroids.forEach(drawAsteroid);

  bullets.forEach(drawBullet);
  enemyBullets.forEach(drawBullet);
  enemies.forEach(drawEnemy);
  items.forEach(drawItem);
  drawBoss();
  drawTentacleBoss();
  drawSplitterBoss();
  drawExplosions();

  if (!gameOver) drawHUD();

  // Death pause overlay
  if (deathPause > 0) {
    ctx.fillStyle = `rgba(255,0,0,${0.15 + Math.sin(frame * 0.3) * 0.1})`;
    ctx.fillRect(-10, -10, W + 20, H + 20);
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = 'bold 32px monospace';
    ctx.fillStyle = '#F44336';
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 20;
    ctx.fillText('LIFE LOST', W / 2, H * 0.4);
    ctx.shadowBlur = 0;
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#fff';
    for (let i = 0; i < lives; i++) {
      ctx.fillText('\u2665', W / 2 - (lives - 1) * 14 + i * 28, H * 0.5);
    }
    ctx.restore();
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

startGame();
loop();
</script>
