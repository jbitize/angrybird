<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDC Guide for High School Students</title>
<style>
:root {
  --bg: #0d1117;
  --fg: #e6edf3;
  --fg-muted: #8b949e;
  --border: #30363d;
  --link: #58a6ff;
  --code-bg: #161b22;
  --table-border: #30363d;
  --table-row: #161b22;
  --blockquote-border: #3b82f6;
  --blockquote-fg: #8b949e;
  --h-border: #21262d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Noto Sans, Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.7;
  color: var(--fg);
  background: var(--bg);
}
.loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; color: var(--fg-muted);
  font-size: 18px;
}
.loading .spinner {
  width: 24px; height: 24px; margin-right: 12px;
  border: 3px solid var(--border);
  border-top-color: var(--link);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}
/* Typography */
.md h1 { font-size: 2em; font-weight: 700; margin: 0 0 16px; padding-bottom: 12px; border-bottom: 1px solid var(--h-border); }
.md h2 { font-size: 1.5em; font-weight: 700; margin: 40px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--h-border); }
.md h3 { font-size: 1.25em; font-weight: 600; margin: 28px 0 12px; }
.md h4 { font-size: 1em; font-weight: 600; margin: 24px 0 8px; }
.md p { margin: 0 0 16px; }
.md a { color: var(--link); text-decoration: none; }
.md a:hover { text-decoration: underline; }
.md strong { font-weight: 600; }
.md hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
/* Lists */
.md ul, .md ol { margin: 0 0 16px; padding-left: 2em; }
.md li { margin: 4px 0; }
.md li > ul, .md li > ol { margin: 4px 0 4px; }
/* Blockquote */
.md blockquote {
  margin: 0 0 16px;
  padding: 4px 16px;
  border-left: 4px solid var(--blockquote-border);
  color: var(--blockquote-fg);
}
.md blockquote p { margin: 8px 0; }
/* Code */
.md code {
  font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 0.88em;
  background: var(--code-bg);
  padding: 2px 6px;
  border-radius: 4px;
}
.md pre {
  background: var(--code-bg);
  padding: 16px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 0 0 16px;
  line-height: 1.5;
}
.md pre code { background: none; padding: 0; font-size: 0.85em; }
/* Tables */
.md table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 16px;
  font-size: 0.92em;
  overflow-x: auto;
  display: block;
}
.md thead { border-bottom: 2px solid var(--table-border); }
.md th {
  font-weight: 600;
  text-align: left;
  padding: 8px 12px;
  white-space: nowrap;
}
.md td { padding: 8px 12px; border-top: 1px solid var(--table-border); }
.md tbody tr:nth-child(even) { background: var(--table-row); }
/* Emoji fix */
.md td:has(> text) { text-align: center; }
/* Responsive */
@media (max-width: 600px) {
  .container { padding: 16px 14px 60px; }
  .md h1 { font-size: 1.6em; }
  .md h2 { font-size: 1.3em; }
  .md table { font-size: 0.82em; }
  .md th, .md td { padding: 6px 8px; }
}
</style>
</head>
<body>
<div id="loading" class="loading">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>
<div id="content" class="container" style="display:none">
  <div id="md" class="md"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@15.0.0/marked.min.js"></script>
<script>
const MD_FILE = 'gdc-opportunities-for-high-school-students.md';

// Custom renderer for anchor IDs on headings
const renderer = new marked.Renderer();
renderer.heading = function({ tokens, depth }) {
  const text = this.parser.parseInline(tokens);
  const raw = tokens.map(t => t.raw || t.text || '').join('');
  const id = raw.toLowerCase()
    .replace(/[^\w가-힣\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '');
  return `<h${depth} id="${id}">${text}</h${depth}>`;
};

marked.setOptions({
  renderer,
  gfm: true,
  breaks: false
});

fetch(MD_FILE)
  .then(res => {
    if (!res.ok) throw new Error('Failed to load');
    return res.text();
  })
  .then(md => {
    document.getElementById('md').innerHTML = marked.parse(md);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    // Scroll to hash if present
    if (location.hash) {
      const el = document.querySelector(location.hash);
      if (el) el.scrollIntoView();
    }
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      `<span style="color:#f85149">Failed to load document. <a href="${MD_FILE}" style="color:#58a6ff">View raw file</a></span>`;
  });
</script>
</body>
</html>
